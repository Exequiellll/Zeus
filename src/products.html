<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zeus Store — Products</title>
    <meta name="description" content="Browse premium products at Zeus Store. Shop headphones, smartwatches and more.">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="store.css">
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark fixed-top" id="mainNav">
        <div class="container">
            <a class="navbar-brand fw-bold" href="products.html">
                <i class="bi bi-lightning-charge-fill text-warning me-1"></i>Zeus Store
            </a>
            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarContent">
                <ul class="navbar-nav ms-auto align-items-center gap-2">
                    <li class="nav-item">
                        <a class="nav-link active" href="products.html"><i class="bi bi-grid me-1"></i>Products</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link position-relative" href="cart.html" id="navCartLink">
                            <i class="bi bi-cart3 me-1"></i>Cart
                            <span class="badge bg-warning text-dark rounded-pill cart-badge" id="navCartBadge" style="display:none;">0</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="orders.html"><i class="bi bi-receipt me-1"></i>Orders</a>
                    </li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown" id="userDropdown">
                            <i class="bi bi-person-circle me-1"></i><span id="navUsername">Guest</span>
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end dropdown-menu-dark">
                            <li><a class="dropdown-item" href="#" id="logoutBtn"><i class="bi bi-box-arrow-right me-2"></i>Logout</a></li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <section class="hero-section">
        <div class="container text-center">
            <h1 class="display-4 fw-bold text-white mb-3">
                <span class="gradient-text">Premium Tech</span> at Your Fingertips
            </h1>
            <p class="lead text-white-50">Discover our curated collection of cutting-edge products</p>
        </div>
    </section>

    <!-- Products Section -->
    <section class="py-5" id="productsSection">
        <div class="container">
            <div class="row g-4 justify-content-center" id="productsGrid">
                <!-- Products will be loaded dynamically -->
                <div class="col-12 text-center py-5" id="productsLoader">
                    <div class="spinner-border text-primary" role="status">
                        <span class="visually-hidden">Loading...</span>
                    </div>
                    <p class="text-muted mt-3">Loading products...</p>
                </div>
            </div>
        </div>
    </section>

    <!-- Toast Notification -->
    <div class="toast-container position-fixed bottom-0 end-0 p-3" style="z-index:9999;">
        <div id="cartToast" class="toast align-items-center text-bg-success border-0" role="alert">
            <div class="d-flex">
                <div class="toast-body">
                    <i class="bi bi-check-circle me-2"></i><span id="toastMessage">Added to cart!</span>
                </div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
            </div>
        </div>
    </div>

    <footer class="text-center py-4 mt-5 border-top border-secondary">
        <p class="text-muted mb-0">&copy; 2026 Zeus Store. All rights reserved.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="store.js"></script>
    <script src="products.js"></script>
</body>
</html>
