<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zeus Store — My Orders</title>
    <meta name="description" content="View your purchase orders and sales invoices at Zeus Store.">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="store.css">
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark fixed-top" id="mainNav">
        <div class="container">
            <a class="navbar-brand fw-bold" href="products.html">
                <i class="bi bi-lightning-charge-fill text-warning me-1"></i>Zeus Store
            </a>
            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarContent">
                <ul class="navbar-nav ms-auto align-items-center gap-2">
                    <li class="nav-item">
                        <a class="nav-link" href="products.html"><i class="bi bi-grid me-1"></i>Products</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link position-relative" href="cart.html" id="navCartLink">
                            <i class="bi bi-cart3 me-1"></i>Cart
                            <span class="badge bg-warning text-dark rounded-pill cart-badge" id="navCartBadge" style="display:none;">0</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="orders.html"><i class="bi bi-receipt me-1"></i>Orders</a>
                    </li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown" id="userDropdown">
                            <i class="bi bi-person-circle me-1"></i><span id="navUsername">Guest</span>
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end dropdown-menu-dark">
                            <li><a class="dropdown-item" href="#" id="logoutBtn"><i class="bi bi-box-arrow-right me-2"></i>Logout</a></li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Orders Section -->
    <section class="content-section">
        <div class="container">
            <h1 class="fw-bold mb-4"><i class="bi bi-receipt me-2"></i>My Orders</h1>
            
            <div id="ordersLoader" class="text-center py-5">
                <div class="spinner-border text-primary" role="status">
                    <span class="visually-hidden">Loading...</span>
                </div>
                <p class="text-muted mt-3">Loading your orders...</p>
            </div>

            <div id="ordersContainer" style="display:none;">
                <!-- Orders rendered here -->
            </div>

            <div id="noOrders" class="text-center py-5" style="display:none;">
                <i class="bi bi-inbox display-1 text-muted"></i>
                <h4 class="text-muted mt-3">No orders yet</h4>
                <p class="text-muted">Start shopping to see your orders here.</p>
                <a href="products.html" class="btn btn-primary mt-2">
                    <i class="bi bi-bag me-2"></i>Shop Now
                </a>
            </div>
        </div>
    </section>

    <footer class="text-center py-4 mt-5 border-top border-secondary">
        <p class="text-muted mb-0">&copy; 2026 Zeus Store. All rights reserved.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="store.js"></script>
    <script src="orders.js"></script>
</body>
</html>
