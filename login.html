<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zeus Store — Sign In</title>
    <meta name="description" content="Sign in or create your Zeus Store account to start shopping premium tech products.">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="login.css">
</head>
<body>

    <!-- Animated background orbs -->
    <div class="bg-orb bg-orb-1"></div>
    <div class="bg-orb bg-orb-2"></div>
    <div class="bg-orb bg-orb-3"></div>

    <div class="auth-wrapper">
        <!-- Left branding panel -->
        <div class="auth-branding d-none d-lg-flex">
            <div class="branding-content">
                <div class="brand-logo mb-4">
                    <i class="bi bi-lightning-charge-fill"></i>
                </div>
                <h2 class="fw-900 mb-3">Zeus Store</h2>
                <p class="text-white-50 mb-5">Premium tech products at your fingertips. Sign in to explore, shop, and track your orders.</p>
                <div class="brand-features">
                    <div class="brand-feature">
                        <i class="bi bi-shield-check"></i>
                        <span>Secure Checkout</span>
                    </div>
                    <div class="brand-feature">
                        <i class="bi bi-lightning"></i>
                        <span>Instant Purchase</span>
                    </div>
                    <div class="brand-feature">
                        <i class="bi bi-receipt"></i>
                        <span>Order Tracking</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Right auth panel -->
        <div class="auth-panel">
            <div class="auth-card">
                <!-- Mobile logo -->
                <div class="text-center d-lg-none mb-4">
                    <i class="bi bi-lightning-charge-fill text-warning fs-1"></i>
                    <h4 class="fw-bold mt-2">Zeus Store</h4>
                </div>

                <!-- Tab Switcher -->
                <div class="auth-tabs" id="authTabs">
                    <button class="auth-tab active" data-tab="login" id="loginTab">
                        <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
                    </button>
                    <button class="auth-tab" data-tab="register" id="registerTab">
                        <i class="bi bi-person-plus me-2"></i>Register
                    </button>
                    <div class="tab-indicator" id="tabIndicator"></div>
                </div>

                <!-- LOGIN FORM -->
                <form id="loginForm" class="auth-form" novalidate>
                    <div class="mb-3">
                        <label for="loginUsername" class="form-label">
                            <i class="bi bi-person me-1"></i>Username
                        </label>
                        <input type="text" class="form-control" id="loginUsername" placeholder="Enter your username" autocomplete="username" required>
                    </div>
                    <div class="mb-3">
                        <label for="loginPassword" class="form-label">
                            <i class="bi bi-lock me-1"></i>Password
                        </label>
                        <div class="input-group">
                            <input type="password" class="form-control" id="loginPassword" placeholder="Enter your password" autocomplete="current-password" required>
                            <button class="btn btn-outline-secondary toggle-pw" type="button" data-target="loginPassword">
                                <i class="bi bi-eye"></i>
                            </button>
                        </div>
                    </div>
                    <div class="form-check mb-4">
                        <input class="form-check-input" type="checkbox" id="remember">
                        <label class="form-check-label text-muted" for="remember">Remember me</label>
                    </div>
                    <button type="submit" class="btn btn-primary-glow w-100 py-3" id="loginBtn">
                        <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
                    </button>
                    <div id="loginStatus" class="auth-status mt-3" role="status" aria-live="polite"></div>
                </form>

                <!-- REGISTER FORM -->
                <form id="registerForm" class="auth-form" style="display:none;" novalidate>
                    <div class="mb-3">
                        <label for="regUsername" class="form-label">
                            <i class="bi bi-person me-1"></i>Username
                        </label>
                        <input type="text" class="form-control" id="regUsername" placeholder="Choose a username" autocomplete="username" required>
                    </div>

                    <div class="mb-3">
                        <label for="regPassword" class="form-label">
                            <i class="bi bi-lock me-1"></i>Password
                        </label>
                        <div class="input-group">
                            <input type="password" class="form-control" id="regPassword" placeholder="Create a password" autocomplete="new-password" required>
                            <button class="btn btn-outline-secondary toggle-pw" type="button" data-target="regPassword">
                                <i class="bi bi-eye"></i>
                            </button>
                        </div>
                    </div>
                    <div class="mb-4">
                        <label for="regPasswordConfirm" class="form-label">
                            <i class="bi bi-lock-fill me-1"></i>Confirm Password
                        </label>
                        <input type="password" class="form-control" id="regPasswordConfirm" placeholder="Confirm your password" autocomplete="new-password" required>
                    </div>
                    <button type="submit" class="btn btn-primary-glow w-100 py-3" id="registerBtn" disabled>
                        <i class="bi bi-person-plus me-2"></i>Create Account
                    </button>
                    <div id="registerStatus" class="auth-status mt-3" role="status" aria-live="polite"></div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="login.js"></script>
</body>
</html>
